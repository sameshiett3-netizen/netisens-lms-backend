<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netisens LMS - Login</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 50px; max-width: 400px; margin: auto; background-color: #f4f4f9;">

    <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="text-align: center;">🎓 Netisens LMS Portal</h2>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button id="showLoginBtn" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer;">Login</button>
            <button id="showRegisterBtn" style="flex: 1; padding: 10px; background: #e2e3e5; color: black; border: none; cursor: pointer;">Sign Up</button>
        </div>

        <form id="authForm">
            <h3 id="formTitle">Secure Login</h3>
            
            <div id="nameBox" style="display: none;">
                <label>Full Name:</label><br>
                <input type="text" id="authName" style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;"><br>
            </div>
            
            <label>Email Address:</label><br>
            <input type="email" id="authEmail" required style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;"><br>
            
            <label>Password:</label><br>
            <input type="password" id="authPassword" required style="width: 100%; padding: 8px; margin-bottom: 5px; box-sizing: border-box;"><br>
            
            <div style="text-align: right; margin-bottom: 15px;">
                <a href="#" id="forgotPasswordLink" style="font-size: 12px; color: #007bff; text-decoration: none;">Forgot Password?</a>
            </div>
            
            <button type="submit" id="submitBtn" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold;">Login to Dashboard</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
