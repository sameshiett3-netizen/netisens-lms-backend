<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netisens LMS</title>
</head>
<body>
    <h1>Netisens VIP Registration</h1>
    <h2>Student Onboarding</h2>
    
    <form id="registerForm">
        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>
        
        <label>Email:</label><br>
        <input type="email" id="email" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <button type="submit">Register Now</button>
    </form>
    <hr> <h2>Student Login</h2>
    <form id="loginForm">
        <label>Email:</label><br>
        <input type="email" id="loginEmail" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="loginPassword" required><br><br>
        
        <button type="submit">Log In</button>
    </form>
    <hr>

    <h2>VIP Area</h2>
    <button id="dashboardBtn">Enter VIP Dashboard</button>
    <hr>
    
    <h2>👨‍🏫 Admin Portal: Course Upload</h2>
    <form id="adminCourseForm">
        <label>Course Code (e.g.,COSC301):</label><br>
        <input type="text" id="courseCode" required><br><br>
        
        <label>Course Title:</label><br>
        <input type="text" id="courseTitle" required><br><br>

        <label>Instructor Name:</label><br>
        <input type="text" id="instructorName" required><br><br>

        <label>Course Folder Link (Notes & PQs):</label><br>
        <input type="url" id="previewLink" required><br><br>

        <label>Fast Download Link (Main Note Only):</label><br>
        <input type="url" id="downloadLink" required><br><br>

        <label>Past Questions (Bulk ZIP Download Link):</label><br>
        <input type="url" id="pqLink" required><br><br>
        
        <button type="submit">Publish Course</button>
    </form>

    <script src="app.js"></script>
</body>
</html>
